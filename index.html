<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FantaMundial 2026 — Fantapazz League</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#ff8c00;
  --dark:#070710;--dark2:#0d0d1a;--dark3:#131325;
  --card:#111128;--card2:#181835;--card3:#1e1e40;
  --accent:#e63946;--accent2:#ff4d5a;
  --green:#00e676;--green2:#00c853;
  --blue:#4fc3f7;
  --muted:#5a607a;--text:#dde3f5;--text2:#a0aac0;
  --border:rgba(255,215,0,0.12);--border2:rgba(255,215,0,0.28);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 25%,rgba(255,215,0,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 75%,rgba(230,57,70,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 55% at 50% 50%,rgba(79,195,247,0.03) 0%,transparent 70%);
}

/* HEADER */
.header{position:relative;z-index:10;text-align:center;padding:3rem 1rem 2rem;border-bottom:1px solid var(--border);overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,215,0,0.06) 0%,transparent 100%);pointer-events:none}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,0.08);border:1px solid var(--border2);color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;padding:5px 16px;border-radius:20px;margin-bottom:1.2rem;text-transform:uppercase}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,6.5rem);letter-spacing:6px;line-height:0.9;background:linear-gradient(135deg,var(--gold) 0%,#fff 40%,var(--gold2) 70%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(255,215,0,0.3));margin-bottom:0.6rem;animation:shimmer 4s ease infinite}
@keyframes shimmer{0%,100%{filter:drop-shadow(0 0 30px rgba(255,215,0,.25))}50%{filter:drop-shadow(0 0 60px rgba(255,215,0,.5))}}
.header-sub{color:var(--muted);font-size:0.85rem;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-weight:600}

/* COUNTDOWN */
.countdown{display:flex;justify-content:center;gap:1.4rem;flex-wrap:wrap;margin:1.6rem 0 0}
.cd-unit{text-align:center}
.cd-val{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block}
.cd-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.cd-sep{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:rgba(255,215,0,0.25);align-self:center;margin-top:-6px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;gap:4px;padding:.7rem 1.2rem;background:rgba(7,7,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1px solid transparent;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--muted);white-space:nowrap;transition:all .22s;position:relative;overflow:hidden}
.nav-btn span{position:relative;z-index:1}
.nav-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold),var(--gold2));opacity:0;transition:opacity .22s;border-radius:20px}
.nav-btn:hover{color:var(--text);border-color:var(--border2)}
.nav-btn.active{color:#070710;border-color:transparent}
.nav-btn.active::before{opacity:1}

/* MAIN */
.main{max-width:1140px;margin:0 auto;padding:2.5rem 1.2rem 5rem;position:relative;z-index:1}

/* SECTION TITLE */
.stitle{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--gold);margin-bottom:.4rem;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';display:block;height:2px;flex:1;background:linear-gradient(90deg,var(--gold),transparent);opacity:.2}
.ssub{color:var(--muted);font-size:.82rem;letter-spacing:.5px;margin-bottom:2rem;font-weight:500}

/* ── HOME CARDS ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.9rem;margin-bottom:2rem}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1rem 1.1rem;position:relative;overflow:hidden;transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s;cursor:default}
.mcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,.07) 0%,transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.mcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .4s cubic-bezier(.34,1.56,.64,1);transform-origin:center}
.mcard:hover{transform:translateY(-7px) scale(1.025);border-color:var(--border2);box-shadow:0 18px 45px rgba(255,215,0,.12),0 4px 14px rgba(0,0,0,.4)}
.mcard:hover::before{opacity:1}
.mcard:hover::after{transform:scaleX(1)}
.mcard.eliminated{opacity:.35;filter:grayscale(.8);border-color:rgba(230,57,70,.2)}
.mcard.eliminated:hover{transform:none;box-shadow:none}
.mcard-elim{position:absolute;top:9px;right:9px;background:var(--accent);color:#fff;font-size:8px;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:12px;text-transform:uppercase;box-shadow:0 2px 8px rgba(230,57,70,.4)}
.mcard-num{position:absolute;top:9px;left:11px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:rgba(255,215,0,.07);pointer-events:none}
.mcard-flag{width:50px;height:34px;object-fit:cover;border-radius:5px;display:block;margin-bottom:.65rem;box-shadow:0 3px 10px rgba(0,0,0,.4);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.mcard:hover .mcard-flag{transform:scale(1.12) rotate(-3deg)}
.mcard-icon{font-size:2rem;margin-bottom:.6rem;display:block;transition:transform .3s}
.mcard:hover .mcard-icon{transform:scale(1.2) rotate(8deg)}
.mcard-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:3px;line-height:1.2}
.mcard-nat{font-size:.72rem;font-weight:600;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.mcard-nat.none{color:var(--muted);font-style:italic}

/* ── SORTEGGIO ── */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:.7rem}
.arow{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;transition:all .25s}
.arow:hover{border-color:var(--border2);background:var(--card2);transform:translateX(3px)}
.arow.is-elim{border-color:rgba(230,57,70,.35);background:rgba(230,57,70,.04)}
.aflag{width:30px;height:21px;object-fit:cover;border-radius:3px;flex-shrink:0;box-shadow:0 1px 5px rgba(0,0,0,.3)}
.aicon{font-size:1.4rem;flex-shrink:0}
.aname{flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);min-width:0}
.aname small{display:block;color:var(--gold);font-size:.72rem;font-weight:600;margin-top:1px}
.aselect{background:var(--dark3);color:var(--text);padding:6px 8px;border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xs);font-size:.78rem;font-family:'Barlow',sans-serif;outline:none;cursor:pointer;transition:border-color .2s;flex-shrink:0;max-width:150px}
.aselect:focus{border-color:rgba(255,215,0,.4)}
.btn-elim{flex-shrink:0;padding:7px 13px;border-radius:var(--radius-xs);border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:800;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.btn-elim:hover{background:rgba(230,57,70,.15);transform:scale(1.06)}
.btn-elim.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(230,57,70,.4)}
.btn-elim.active:hover{background:var(--accent2);transform:scale(1.08)}

/* ── GIRONI ── */
.tab-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.8rem}
.tab-btn{padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:var(--dark2);color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.tab-btn:hover{color:var(--text);border-color:var(--border2)}
.tab-btn.active{background:var(--card3);color:var(--gold);border-color:rgba(255,215,0,.35)}

.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem}
.mcard2{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem 1rem;position:relative;overflow:hidden;transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s}
.mcard2::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,.04),transparent);opacity:0;transition:opacity .3s;pointer-events:none}
.mcard2::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .4s;transform-origin:center}
.mcard2:hover{transform:translateY(-5px) scale(1.015);border-color:rgba(255,215,0,.3);box-shadow:0 20px 50px rgba(0,0,0,.4),0 0 30px rgba(255,215,0,.08)}
.mcard2:hover::before{opacity:1}
.mcard2:hover::after{transform:scaleX(1)}
.mlabel{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:700;margin-bottom:.8rem;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.mbody{display:flex;align-items:center;gap:.5rem}
.mteam{flex:1;text-align:center;min-width:0}
.mflag{width:44px;height:30px;object-fit:cover;border-radius:4px;display:block;margin:0 auto 5px;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.mcard2:hover .mflag{transform:scale(1.12)}
.mnat{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mmgr{font-size:.63rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mcenter{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:74px}
.score-box{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;display:flex;align-items:center;gap:5px;line-height:1}
.sdash{color:var(--muted);font-size:1.3rem}
.sw{color:var(--green)}
.sl{color:var(--accent);opacity:.6}
.sd{color:var(--text)}
.vs-tag{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);letter-spacing:2px}
.ptag{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.wpill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.pw{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.pd{background:rgba(255,165,0,.1);color:var(--gold2);border:1px solid rgba(255,165,0,.2)}
.mbtn2{width:100%;margin-top:.9rem;padding:9px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#070710;border:none;border-radius:var(--radius-xs);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 14px rgba(255,165,0,.25)}
.mbtn2:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 24px rgba(255,165,0,.4);filter:brightness(1.08)}
.mbtn2:active{transform:scale(.98)}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--dark2);border:1px solid rgba(255,215,0,.2);border-radius:var(--radius);padding:2rem;width:100%;max-width:440px;animation:su .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(255,215,0,.05)}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--gold);margin-bottom:1.5rem}
.mteams{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;justify-content:center}
.mt{text-align:center;flex:1}
.mfl{width:60px;height:42px;object-fit:cover;border-radius:6px;display:block;margin:0 auto 8px;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.mtn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--text)}
.mmn{font-size:.72rem;color:var(--muted);margin-top:2px}
.mvs{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--muted);letter-spacing:2px;flex-shrink:0}
.rlbl{font-size:.72rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:700;text-align:center;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}
.sinputs{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:1.5rem}
.sinput{width:80px;padding:14px 8px;background:var(--dark3);border:2px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:2.2rem;text-align:center;font-family:'Bebas Neue',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.sinput:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.15)}
.sds{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--muted)}
.mactions{display:flex;gap:10px}
.mbtn{flex:1;padding:12px;border-radius:var(--radius-xs);border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.mbtn.cancel{background:var(--card3);color:var(--muted);border:1px solid var(--border)}
.mbtn.cancel:hover{color:var(--text);transform:translateY(-1px)}
.mbtn.save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#070710;box-shadow:0 4px 16px rgba(255,165,0,.3)}
.mbtn.save:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,165,0,.45);filter:brightness(1.06)}

/* ── CLASSIFICA ── */
.sttable{width:100%;border-collapse:collapse}
.sttable thead tr{border-bottom:1px solid var(--border)}
.sttable th{padding:10px 14px;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.sttable th.r{text-align:right}
.sttable td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.sttable tr:hover td{background:rgba(255,215,0,.03)}
.sttable tr.er td{opacity:.32}
.rn{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--muted)}
.rn.g{color:var(--gold)}.rn.s{color:#c0c0c0}.rn.b{color:#cd7f32}
.pts{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--text);text-align:right}
.nc{text-align:right;color:var(--muted);font-size:.85rem}
.dpos{color:var(--green)}.dneg{color:var(--accent)}
.nflag{width:22px;height:15px;object-fit:cover;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px}
.epill{display:inline-block;background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.25);color:var(--accent);font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;letter-spacing:1px;text-transform:uppercase;vertical-align:middle}
.notice{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);border-radius:var(--radius);padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1rem;margin-top:1.5rem}
.notice p{color:var(--muted);font-size:.85rem}
.notice strong{color:var(--gold)}

/* ANIM */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ci{animation:cardIn .4s ease both}

@media(max-width:600px){
  .match-grid,.mgrid{grid-template-columns:1fr 1fr}
  .agrid{grid-template-columns:1fr}
  .arow{flex-wrap:wrap}
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const MANAGERS=[
  {id:1,name:"Denis Mascherin"},{id:2,name:"Kevin Di Bernardo"},

];
const NATS=[
  {code:"ARG",name:"Argentina",flag:"https://flagcdn.com/w80/ar.png"},

  ]},
  {label:"Giornata 2",matches:[

const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}};
const gn=(c)=>NATS.find(n=>n.code===c)||{code:c,name:c,flag:""};
const gm=(assign,c)=>{const id=Object.entries(assign).find(([,v])=>v===c)?.[0];return MANAGERS.find(m=>m.id==id)};

function CD(){
  const tgt=new Date("2026-06-11T18:00:00");
  const [diff,setDiff]=useState(Math.max(0,tgt-Date.now()));
  useEffect(()=>{const t=setInterval(()=>setDiff(Math.max(0,tgt-Date.now())),1000);return()=>clearInterval(t)},[]);
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  return(
    <div className="countdown">
      {[["Giorni",d],["Ore",h],["Min",m],["Sec",s]].map(([l,v],i)=>(
        <React.Fragment key={l}>
          {i>0&&<div className="cd-sep">:</div>}
          <div className="cd-unit">
            <span className="cd-val">{String(v).padStart(2,"0")}</span>
            <div className="cd-lbl">{l}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("home");
  const [rnd,setRnd]=useState(0);
  const [assign,setAssign]=useState(()=>ld("fm26_assign",{}));
  const [elim,setElim]=useState(()=>ld("fm26_elim",[]));
  const [scores,setScores]=useState(()=>ld("fm26_scores",{}));
  const [modal,setModal]=useState(null);
  const hsR=useRef(),asR=useRef();

  useEffect(()=>sv("fm26_assign",assign),[assign]);
  useEffect(()=>sv("fm26_elim",elim),[elim]);
  useEffect(()=>sv("fm26_scores",scores),[scores]);

  const toggleElim=(id)=>setElim(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const saveScore=()=>{
    const hs=parseInt(hsR.current.value);
    const as=parseInt(asR.current.value);
    if(isNaN(hs)||isNaN(as))return;
    setScores(p=>({...p,[modal.id]:{hs,as}}));
    setModal(null);
  };

  const standings=MANAGERS.map(m=>{
    let pts=0,gf=0,gs=0,v=0,n=0,p=0;
    const nat=assign[m.id];
    ROUNDS.flatMap(r=>r.matches).forEach(match=>{
      const sc=scores[match.id];
      if(!sc||!nat)return;
      if(match.h===nat){gf+=sc.hs;gs+=sc.as;if(sc.hs>sc.as){pts+=3;v++}else if(sc.hs===sc.as){pts++;n++}else p++}
      else if(match.a===nat){gf+=sc.as;gs+=sc.hs;if(sc.as>sc.hs){pts+=3;v++}else if(sc.hs===sc.as){pts++;n++}else p++}
    });
    return{...m,pts,gf,gs,dr:gf-gs,v,n,p,isElim:elim.includes(m.id)};
  }).sort((a,b)=>b.pts-a.pts||b.dr-a.dr);

  const NAV=[
    {id:"home",label:"🏠 Home"},
    {id:"sorteggio",label:"🎲 Sorteggio"},
    {id:"gironi",label:"⚽ Fase a Gironi"},
    {id:"classifica",label:"📊 Classifica"}
  ];

  return(
    <div>
      <div className="header">
        <div className="eyebrow">🏆 Fantapazz League · Season 2026</div>
        <h1>FantaMundial 2026</h1>
        <div className="header-sub">USA · Canada · Messico — 11 Giugno 2026</div>
        <CD/>
      </div>
      <nav className="nav">
        {NAV.map(t=>(
          <button key={t.id} className={`nav-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
      <main className="main">

        {tab==="home"&&(
          <div>
            <div className="stitle">🏆 Fantallenatori</div>
            <div className="ssub">Le 12 squadre del FantaMundial 2026</div>
            <div className="mgrid">
              {MANAGERS.map((m,i)=>{
                const nat=assign[m.id]?gn(assign[m.id]):null;
                const isE=elim.includes(m.id);
                return(
                  <div key={m.id} className={`mcard ci${isE?" eliminated":""}`} style={{animationDelay:`${i*.05}s`}}>
                    <div className="mcard-num">{i+1}</div>
                    {isE&&<div className="mcard-elim">Elim.</div>}
                    {nat?.flag
                      ?<img src={nat.flag} className="mcard-flag" alt={nat.name} onError={e=>{e.target.style.display="none"}}/>
                      :<span className="mcard-icon">🎽</span>
                    }
                    <div className="mcard-name">{m.name}</div>
                    <div className={`mcard-nat${nat?"":" none"}`}>{nat?nat.name:"Da assegnare"}</div>
                  </div>
                );
              })}
            </div>
            <div className="notice">
              <span style={{fontSize:"2rem"}}>📅</span>
              <p>Sorteggio nazionali: <strong>Venerdì 3 Aprile 2026</strong> — Vai in <strong>Sorteggio</strong> per abbinare le nazionali ai fantallenatori.</p>
            </div>
          </div>
        )}

        {tab==="sorteggio"&&(
          <div>
            <div className="stitle">🎲 Sorteggio Nazionali</div>
            <div className="ssub">Abbina ogni fantallenatore · clicca ELIMINA quando la sua nazionale esce dal Mondiale</div>
            <div className="agrid">
              {MANAGERS.map((m,i)=>{
                const isE=elim.includes(m.id);
                const nat=assign[m.id]?gn(assign[m.id]):null;
                return(
                  <div key={m.id} className={`arow ci${isE?" is-elim":""}`} style={{animationDelay:`${i*.04}s`}}>
                    {nat?.flag
                      ?<img src={nat.flag} className="aflag" alt="" onError={e=>{e.target.style.display="none"}}/>
                      :<span className="aicon">🎽</span>
                    }
                    <div className="aname">
                      {m.name}
                      {nat&&<small>{nat.name}</small>}
                    </div>
                    <select className="aselect" value={assign[m.id]||""} onChange={e=>{
                      const v=e.target.value;
                      setAssign(p=>{const n={...p};if(v)n[m.id]=v;else delete n[m.id];return n});
                    }}>
                      <option value="">— Scegli —</option>
                      {NATS.map(n=><option key={n.code} value={n.code}>{n.name}</option>)}
                    </select>
                    <button className={`btn-elim${isE?" active":""}`} onClick={()=>toggleElim(m.id)}>
                      {isE?"✅ Riammetti":"❌ Elimina"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="gironi"&&(
          <div>
            <div className="stitle">⚽ Fase a Gironi</div>
            <div className="tab-list">
              {ROUNDS.map((r,i)=>(
                <button key={i} className={`tab-btn${rnd===i?" active":""}`} onClick={()=>setRnd(i)}>{r.label}</button>
              ))}
            </div>
            <div className="match-grid">
              {ROUNDS[rnd].matches.map((base,i)=>{
                const sc=scores[base.id];
                const has=sc!==undefined;
                const nH=gn(base.h),nA=gn(base.a);
                const mH=gm(assign,base.h),mA=gm(assign,base.a);
                const wH=has&&sc.hs>sc.as;
                const wA=has&&sc.as>sc.hs;
                const dr=has&&sc.hs===sc.as;
                return(
                  <div key={base.id} className="mcard2 ci" style={{animationDelay:`${i*.06}s`}}>
                    <div className="mlabel">{base.id.toUpperCase()}</div>
                    <div className="mbody">
                      <div className="mteam">
                        {nH.flag&&<img src={nH.flag} className="mflag" alt={nH.name} onError={e=>{e.target.style.display="none"}}/>}
                        <div className="mnat">{nH.name}</div>
                        <div className="mmgr">{mH?.name||"CPU"}</div>
                      </div>
                      <div className="mcenter">
                        {has?(
                          <>
                            <div className="score-box">
                              <span className={wH?"sw":wA?"sl":"sd"}>{sc.hs}</span>
                              <span className="sdash">—</span>
                              <span className={wA?"sw":wH?"sl":"sd"}>{sc.as}</span>
                            </div>
                            <div className={`wpill ${dr?"pd":"pw"}`}>
                              {dr?"Pareggio":wH?nH.name.split(" ")[0]:nA.name.split(" ")[0]}
                            </div>
                          </>
                        ):(
                          <>
                            <div className="vs-tag">VS</div>
                            <div className="ptag">Da giocare</div>
                          </>
                        )}
                      </div>
                      <div className="mteam">
                        {nA.flag&&<img src={nA.flag} className="mflag" alt={nA.name} onError={e=>{e.target.style.display="none"}}/>}
                        <div className="mnat">{nA.name}</div>
                        <div className="mmgr">{mA?.name||"CPU"}</div>
                      </div>
                    </div>
                    <button className="mbtn2" onClick={()=>setModal(base)}>
                      ⚽ {has?"Aggiorna Risultato":"Inserisci Risultato"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="classifica"&&(
          <div>
            <div className="stitle">📊 Classifica FantaMundial</div>
            <div className="ssub">Vittoria +3 · Pareggio +1 · Sconfitta 0</div>
            <div style={{overflowX:"auto"}}>
              <table className="sttable">
                <thead>
                  <tr>
                    <th>#</th><th>Fantallenatore</th><th>Nazionale</th>
                    <th className="r">PT</th><th className="r">V</th>
                    <th className="r">N</th><th className="r">P</th><th className="r">DR</th>
                  </tr>
                </thead>
                <tbody>
                  {standings.map((s,i)=>{
                    const nat=assign[s.id]?gn(assign[s.id]):null;
                    return(
                      <tr key={s.id} className={s.isElim?"er":""}>
                        <td><span className={`rn${i===0?" g":i===1?" s":i===2?" b":""}`}>{i+1}</span></td>
                        <td style={{fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",fontSize:".95rem"}}>
                          {s.name}{s.isElim&&<span className="epill">Elim.</span>}
                        </td>
                        <td>
                          {nat?(
                            <span>
                              <img src={nat.flag} className="nflag" alt="" onError={e=>{e.target.style.display="none"}}/>
                              <span style={{fontSize:".82rem",color:"var(--text2)"}}>{nat.name}</span>
                            </span>
                          ):<span style={{color:"var(--muted)"}}>—</span>}
                        </td>
                        <td className="pts">{s.pts}</td>
                        <td className="nc" style={{color:"var(--green)"}}>{s.v}</td>
                        <td className="nc">{s.n}</td>
                        <td className="nc" style={{color:"var(--accent)"}}>{s.p}</td>
                        <td className={`nc${s.dr>0?" dpos":s.dr<0?" dneg":""}`}>{s.dr>0?"+":""}{s.dr}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </main>

      {modal&&(()=>{
        const nH=gn(modal.h),nA=gn(modal.a);
        const mH=gm(assign,modal.h),mA=gm(assign,modal.a);
        const ex=scores[modal.id];
        return(
          <div className="moverlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
            <div className="modal">
              <div className="mtitle">📋 Inserisci Risultato</div>
              <div className="mteams">
                <div className="mt">
                  {nH.flag&&<img src={nH.flag} className="mfl" alt="" onError={e=>{e.target.style.display="none"}}/>}
                  <div className="mtn">{nH.name}</div>
                  {mH&&<div className="mmn">{mH.name}</div>}
                </div>
                <div className="mvs">VS</div>
                <div className="mt">
                  {nA.flag&&<img src={nA.flag} className="mfl" alt="" onError={e=>{e.target.style.display="none"}}/>}
                  <div className="mtn">{nA.name}</div>
                  {mA&&<div className="mmn">{mA.name}</div>}
                </div>
              </div>
              <div className="rlbl">Risultato</div>
              <div className="sinputs">
                <input ref={hsR} type="number" min="0" max="99" className="sinput" defaultValue={ex?.hs??0}/>
                <span className="sds">—</span>
                <input ref={asR} type="number" min="0" max="99" className="sinput" defaultValue={ex?.as??0}/>
              </div>
              <div className="mactions">
                <button className="mbtn cancel" onClick={()=>setModal(null)}>Annulla</button>
                <button className="mbtn save" onClick={saveScore}>Salva ✓</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
